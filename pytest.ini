[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -ra
    --cov=core
    --cov=execution
    --cov=data
    --cov=storage
    --cov=backtest
    --cov=orchestrator
    --cov=settings
    --cov-report=term-missing
    --cov-fail-under=65
    --ignore=tests/test_process_manager.py
    --ignore=tests/test_data_integrity_integration.py
