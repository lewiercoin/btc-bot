name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff optuna

      - name: Compile all
        run: python -m compileall . -q

      - name: Unit tests
        run: python -m pytest tests/ -x --tb=short

      - name: Lint (research_lab + tests)
        run: python -m ruff check research_lab/ tests/

      - name: Critical smoke tests (no DB/network)
        run: python scripts/smoke_phase_c.py
